<html lang="en">

 <link

/>

  <body>

      <div class="box-container">
        <div class="child-container">
          <figure class="profile-hero">

            <figcaption class="info">
              <h2>Victor Crest <span>26</span></h2>
            </figcaption>
          </figure>

          <p calss="location">London</p>
          <footer>
            <div class="text">
              <h4>80K</h4>
              <p>Followers</p>
            </div>
            <div class="text">
              <h4>803K</h4>
              <p>likes</p>
            </div>
            <div class="text">
              <h4>1.4K</h4>

            </div>
          </footer>
        </div>
      </div>
    </div>

</html>
